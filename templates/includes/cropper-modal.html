<!-- Cropper Modal -->
<div id="cropperModal" class="fixed inset-0 bg-black/95 z-50 flex items-center justify-center hidden">
    <div class="bg-neutral-800 rounded-2xl p-6 max-w-2xl w-full mx-4 shadow-2xl border border-neutral-700" style="max-height: 90vh;">
        <h3 class="text-lg font-semibold text-white mb-1">Crop Your Photo</h3>
        <p class="text-gray-500 text-sm mb-4">Drag to move, corners to resize proportionally</p>

        <div class="bg-neutral-900 rounded-xl overflow-hidden mb-4 relative flex items-center justify-center border border-neutral-800" id="cropperContainer" style="height: 350px;">
            <img id="cropperImage" class="max-w-full max-h-full object-contain" style="display: block;">
            <div id="cropFrame" class="absolute z-20 rounded-full" style="min-width: 80px; min-height: 80px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.7);">
                <!-- Connecting lines between handles (forming a square) -->
                <svg class="absolute inset-0 w-full h-full pointer-events-none" preserveAspectRatio="none">
                    <!-- Top edge: nw to ne -->
                    <line x1="0" y1="0" x2="100%" y2="0" stroke="rgb(168, 85, 247)" stroke-width="1" vector-effect="non-scaling-stroke"/>
                    <!-- Right edge: ne to se -->
                    <line x1="100%" y1="0" x2="100%" y2="100%" stroke="rgb(168, 85, 247)" stroke-width="1" vector-effect="non-scaling-stroke"/>
                    <!-- Bottom edge: se to sw -->
                    <line x1="100%" y1="100%" x2="0" y2="100%" stroke="rgb(168, 85, 247)" stroke-width="1" vector-effect="non-scaling-stroke"/>
                    <!-- Left edge: sw to nw -->
                    <line x1="0" y1="100%" x2="0" y2="0" stroke="rgb(168, 85, 247)" stroke-width="1" vector-effect="non-scaling-stroke"/>
                </svg>
                <!-- Draggable circle overlay -->
                <div id="cropCircle" class="w-full h-full border-2 border-purple-500 rounded-full cursor-move"></div>
                <!-- Center crosshair -->
                <div class="absolute top-1/2 left-2 right-2 h-px bg-purple-500/40 -translate-y-1/2 pointer-events-none"></div>
                <div class="absolute left-1/2 top-2 bottom-2 w-px bg-purple-500/40 -translate-x-1/2 pointer-events-none"></div>
                <!-- Corner handles -->
                <div class="resize-handle absolute w-4 h-4 bg-neutral-800 border-2 border-purple-500 rounded-full cursor-nw-resize hover:bg-purple-600 hover:border-purple-400 transition-colors" data-dir="nw" style="top: -8px; left: -8px;"></div>
                <div class="resize-handle absolute w-4 h-4 bg-neutral-800 border-2 border-purple-500 rounded-full cursor-ne-resize hover:bg-purple-600 hover:border-purple-400 transition-colors" data-dir="ne" style="top: -8px; right: -8px;"></div>
                <div class="resize-handle absolute w-4 h-4 bg-neutral-800 border-2 border-purple-500 rounded-full cursor-sw-resize hover:bg-purple-600 hover:border-purple-400 transition-colors" data-dir="sw" style="bottom: -8px; left: -8px;"></div>
                <div class="resize-handle absolute w-4 h-4 bg-neutral-800 border-2 border-purple-500 rounded-full cursor-se-resize hover:bg-purple-600 hover:border-purple-400 transition-colors" data-dir="se" style="bottom: -8px; right: -8px;"></div>
                <!-- Edge handles -->
                <div class="resize-handle absolute w-4 h-4 bg-neutral-800 border-2 border-purple-500 rounded-full cursor-n-resize hover:bg-purple-600 hover:border-purple-400 transition-colors" data-dir="n" style="top: -8px; left: 50%; transform: translateX(-50%);"></div>
                <div class="resize-handle absolute w-4 h-4 bg-neutral-800 border-2 border-purple-500 rounded-full cursor-s-resize hover:bg-purple-600 hover:border-purple-400 transition-colors" data-dir="s" style="bottom: -8px; left: 50%; transform: translateX(-50%);"></div>
                <div class="resize-handle absolute w-4 h-4 bg-neutral-800 border-2 border-purple-500 rounded-full cursor-w-resize hover:bg-purple-600 hover:border-purple-400 transition-colors" data-dir="w" style="left: -8px; top: 50%; transform: translateY(-50%);"></div>
                <div class="resize-handle absolute w-4 h-4 bg-neutral-800 border-2 border-purple-500 rounded-full cursor-e-resize hover:bg-purple-600 hover:border-purple-400 transition-colors" data-dir="e" style="right: -8px; top: 50%; transform: translateY(-50%);"></div>
            </div>
        </div>

        <div class="flex justify-end gap-3">
            <button type="button" onclick="closeCropper()" class="px-5 py-2 bg-neutral-700 hover:bg-neutral-600 text-white text-sm font-medium rounded-lg transition-colors">
                Cancel
            </button>
            <button type="button" id="cropSaveBtn" class="px-5 py-2 bg-purple-600 hover:bg-purple-700 text-white text-sm font-medium rounded-lg transition-colors">
                Save Photo
            </button>
        </div>
    </div>
</div>

<aside class="w-64 bg-neutral-950 border-r border-neutral-800 flex flex-col">
    <div class="p-6 border-b border-neutral-800">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-purple-600 flex items-center justify-center">
                <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <span class="text-lg font-bold text-white">CRM</span>
        </div>
    </div>

    <nav class="flex-1 p-4">
        <ul class="space-y-1">
            <li>
                <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg {% if request.resolver_match.url_name == 'dashboard' %}bg-purple-600/10 text-purple-400{% else %}text-gray-400 hover:text-white hover:bg-neutral-800{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span class="text-sm font-medium">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="{% url 'contacts' %}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg {% if request.resolver_match.url_name == 'contacts' or request.resolver_match.url_name == 'contact-create' %}bg-purple-600/10 text-purple-400{% else %}text-gray-400 hover:text-white hover:bg-neutral-800{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span class="text-sm font-medium">Contacts</span>
                </a>
            </li>
            <li>
                <a href="#" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-400 hover:text-white hover:bg-neutral-800">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                    <span class="text-sm font-medium">Companies</span>
                </a>
            </li>
            <li>
                <a href="{% url 'settings' %}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg {% if request.resolver_match.url_name == 'settings' %}bg-purple-600/10 text-purple-400{% else %}text-gray-400 hover:text-white hover:bg-neutral-800{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span class="text-sm font-medium">Settings</span>
                </a>
            </li>
            <li>
                <a href="{% url 'import-export' %}" class="flex items-center gap-3 px-4 py-2.5 rounded-lg {% if request.resolver_match.url_name == 'import-export' %}bg-purple-600/10 text-purple-400{% else %}text-gray-400 hover:text-white hover:bg-neutral-800{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                    <span class="text-sm font-medium">Import / Export</span>
                </a>
            </li>
        </ul>
    </nav>

    <div class="p-4 border-t border-neutral-800">
        <a href="{% url 'settings' %}" class="flex items-center gap-3">
            {% if user.avatar %}
            <img src="{{ user.avatar.url }}" class="w-9 h-9 rounded-full object-cover" alt="{{ user.get_full_name }}">
            {% else %}
            <div class="w-9 h-9 rounded-full bg-purple-600 flex items-center justify-center text-white text-sm font-medium">
                {{ user.first_name.0|default:user.username.0|upper }}
            </div>
            {% endif %}
            <div class="flex-1 min-w-0">
                <p class="text-sm font-medium text-white truncate">{{ user.get_full_name }}</p>
                <p class="text-xs text-gray-400 capitalize">{{ user.role|lower }}</p>
            </div>
        </a>
    </div>
</aside>

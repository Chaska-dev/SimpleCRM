<style>
    /* ----------------------------------------------------------------
       Sidebar collapse animation.

       Hard rule: the icons NEVER move. They are always at the same x.
       We achieve this by NEVER changing padding-left on any of the
       containers — only padding-right shrinks when the sidebar
       collapses, and `gap` collapses to 0 so the dead text doesn't
       leave a phantom space.
    ---------------------------------------------------------------- */

    /* The aside itself animates its width */
    #sidebar {
        transition: width 400ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* The toggle button: only padding-right + background animate.
       padding-left stays at 1rem always. */
    #sidebar #sidebar-toggle {
        transition: background-color 200ms ease, padding 400ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* The title text in the toggle fades + collapses to 0 width */
    #sidebar .sidebar-text {
        transition:
            opacity 250ms cubic-bezier(0.4, 0, 0.2, 1),
            max-width 350ms cubic-bezier(0.4, 0, 0.2, 1),
            margin-left 350ms cubic-bezier(0.4, 0, 0.2, 1);
        max-width: 200px;
        overflow: hidden;
        white-space: nowrap;
    }

    /* Nav items: padding-left is ALWAYS 1rem (icon glued to same x).
       Only padding-right + gap animate. */
    #sidebar #sidebar-nav a {
        transition:
            background-color 200ms ease,
            padding 400ms cubic-bezier(0.4, 0, 0.2, 1),
            gap 350ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    #sidebar #sidebar-nav a .sidebar-text {
        transition:
            opacity 250ms cubic-bezier(0.4, 0, 0.2, 1),
            max-width 350ms cubic-bezier(0.4, 0, 0.2, 1);
        max-width: 160px;
    }

    /* The user section at the bottom: NEVER fully hides. The avatar
       stays visible (clickable → settings). The text + logout form
       are .sidebar-text so they collapse with the same animation. */

    /* ---- COLLAPSED STATE ----
       Only padding-right + gap change. padding-left is the SAME as
       expanded on every element, so the icons don't move. */
    #sidebar.is-collapsed #sidebar-toggle {
        padding-left: 1rem;          /* SAME as expanded */
        padding-right: 0.5rem;
    }

    /* The nav itself: padding-left is unchanged. */
    #sidebar.is-collapsed #sidebar-nav a {
        padding-left: 1rem;          /* SAME as expanded */
        padding-right: 0.5rem;
        gap: 0;
    }

    /* Hide the text by collapsing its width and fading it. */
    #sidebar.is-collapsed .sidebar-text {
        opacity: 0;
        max-width: 0;
        margin-left: 0;
    }
</style>

<aside id="sidebar" class="w-64 bg-neutral-950 border-r border-neutral-800 flex flex-col fixed left-0 top-0 h-screen z-50 overflow-hidden">
    <button id="sidebar-toggle" type="button" class="h-16 px-4 border-b border-neutral-800 flex items-center gap-3 hover:bg-neutral-900 w-full text-left flex-shrink-0" aria-label="Toggle sidebar">
        <div class="w-10 h-10 rounded-lg bg-purple-600 flex items-center justify-center overflow-hidden flex-shrink-0">
            {% if user.workspace.logo %}
            <img src="{{ user.workspace.logo.url }}" class="w-full h-full object-cover" alt="{{ user.workspace.company_name|default:'Workspace logo' }}">
            {% else %}
            <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
            </svg>
            {% endif %}
        </div>
        <span id="sidebar-title" class="text-lg font-bold text-white sidebar-text truncate">
            {{ user.workspace.company_name|default:user.workspace.name|default:"CRM" }}
        </span>
    </button>

    <nav id="sidebar-nav" class="flex-1 p-4 overflow-hidden">
        <ul class="space-y-1">
            <li>
                <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 h-11 rounded-lg {% if request.resolver_match.url_name == 'dashboard' %}bg-purple-600/10 text-purple-400{% else %}text-gray-400 hover:text-white hover:bg-neutral-800{% endif %}">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                    </svg>
                    <span class="text-sm font-medium sidebar-text">Dashboard</span>
                </a>
            </li>
            <li>
                <a href="{% url 'contacts' %}" class="flex items-center gap-3 px-4 h-11 rounded-lg {% if request.resolver_match.url_name == 'contacts' or request.resolver_match.url_name == 'contact-create' %}bg-purple-600/10 text-purple-400{% else %}text-gray-400 hover:text-white hover:bg-neutral-800{% endif %}">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span class="text-sm font-medium sidebar-text">Contacts</span>
                </a>
            </li>
            <li>
                <a href="{% url 'companies' %}" class="flex items-center gap-3 px-4 h-11 rounded-lg text-gray-400 hover:text-white hover:bg-neutral-800">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                    </svg>
                    <span class="text-sm font-medium sidebar-text">Companies</span>
                </a>
            </li>
            <li>
                <a href="{% url 'import-export' %}" class="flex items-center gap-3 px-4 h-11 rounded-lg {% if request.resolver_match.url_name == 'import-export' %}bg-purple-600/10 text-purple-400{% else %}text-gray-400 hover:text-white hover:bg-neutral-800{% endif %}">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
                    </svg>
                    <span class="text-sm font-medium sidebar-text">Import / Export</span>
                </a>
            </li>
            <li>
                <a href="{% url 'settings' %}" class="flex items-center gap-3 px-4 h-11 rounded-lg {% if request.resolver_match.url_name == 'settings' %}bg-purple-600/10 text-purple-400{% else %}text-gray-400 hover:text-white hover:bg-neutral-800{% endif %}">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    </svg>
                    <span class="text-sm font-medium sidebar-text">Settings</span>
                </a>
            </li>
        </ul>
    </nav>

    <div id="sidebar-user" class="p-4 border-t border-neutral-800 h-16 flex items-center gap-2 flex-shrink-0 overflow-hidden whitespace-nowrap">
        <a href="{% url 'settings' %}" class="flex items-center gap-3 flex-1 min-w-0">
            {% if user.avatar %}
            <img src="{{ user.avatar.url }}" class="w-9 h-9 rounded-full object-cover flex-shrink-0" alt="{{ user.get_full_name }}">
            {% else %}
            <div class="w-9 h-9 rounded-full bg-purple-600 flex items-center justify-center text-white text-sm font-medium flex-shrink-0">
                {{ user.first_name.0|default:user.username.0|upper }}
            </div>
            {% endif %}
            <div class="flex-1 min-w-0 sidebar-text">
                <p class="text-sm font-medium text-white truncate">{{ user.get_full_name }}</p>
                <p class="text-xs text-gray-400 capitalize">{{ user.role|lower }}</p>
            </div>
        </a>
        <form method="POST" action="{% url 'logout' %}" class="flex-shrink-0 sidebar-text">
            {% csrf_token %}
            <button type="submit" class="p-2 text-gray-400 hover:text-red-400 rounded-lg hover:bg-neutral-800" title="Sign out" aria-label="Sign out">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                </svg>
            </button>
        </form>
    </div>
</aside>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const sidebar = document.getElementById('sidebar');
    const toggleBtn = document.getElementById('sidebar-toggle');

    toggleBtn.addEventListener('click', function() {
        const collapsed = sidebar.classList.toggle('is-collapsed');
        sidebar.classList.toggle('w-64', !collapsed);
        sidebar.classList.toggle('w-16', collapsed);

        document.querySelectorAll('main').forEach(function(main) {
            main.classList.toggle('ml-64', !collapsed);
            main.classList.toggle('ml-16', collapsed);
        });
    });
});
</script>

<header class="sticky top-0 z-40 bg-neutral-800 border-b border-neutral-700 px-6 py-4 transition-all duration-300">
    <div class="flex items-center justify-between gap-4">
        <div class="flex items-center gap-4 min-w-0">
            {% if back_url %}
            <a href="{% url back_url %}" class="p-2 text-gray-400 hover:text-white rounded-lg hover:bg-neutral-700 flex-shrink-0">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                </svg>
            </a>
            {% endif %}
            <h1 class="text-xl font-semibold text-white truncate">{{ navbar_title|default:"Dashboard" }}</h1>
        </div>
        <div class="flex items-center gap-3 flex-shrink-0">
            <button class="p-2 text-gray-400 hover:text-white rounded-lg hover:bg-gray-700 relative">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
                <span class="absolute top-1 right-1 w-2 h-2 bg-purple-500 rounded-full"></span>
            </button>
        </div>
    </div>
</header>

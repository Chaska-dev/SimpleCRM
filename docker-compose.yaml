services:
  web:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DEBUG: "False"

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: crm
      POSTGRES_USER: crm
      POSTGRES_PASSWORD: crm
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: